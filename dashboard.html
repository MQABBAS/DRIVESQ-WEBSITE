<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DriveSQ — My Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--red:#D10A11;--red2:#a80008;--red3:#ff2d35;--gold:#F5C518;--blk:#080808;--dk:#111;--dk2:#181818;--dk3:#202020;--bdr:#2a2a2a;--bdr2:#333;--txt:#f0f0f0;--muted:#888;--green:#25D366;--green2:#1da851;--r:12px;--trans:.2s ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--blk);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Oswald',sans-serif;line-height:1.05}
a{color:var(--red);text-decoration:none}

/* ── NAV ── */
.nav{background:var(--blk);border-bottom:2px solid var(--red);padding:0;position:sticky;top:0;z-index:200}
.nav-inner{max-width:1200px;margin:0 auto;padding:8px 20px;display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;border-radius:50%;border:2px solid var(--red);object-fit:cover;flex-shrink:0}
.brand-wrap{flex:1}
.brand-name{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:1px;line-height:1}
.brand-name span{color:var(--red)}
.brand-sub{font-size:.58rem;color:#444;letter-spacing:2px;text-transform:uppercase}
.type-nav{font-size:.78rem;color:#666;font-style:italic;flex:1;text-align:center;display:none}
@media(min-width:768px){.type-nav{display:block}}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.instructor-badge{display:flex;align-items:center;gap:7px;background:rgba(209,10,17,.1);border:1px solid rgba(209,10,17,.25);border-radius:8px;padding:5px 12px}
.instructor-badge .name{font-size:.8rem;font-weight:700;color:#ddd;font-family:'Oswald',sans-serif}
.instructor-badge .badge-num{font-size:.65rem;color:#555}
.btn-logout{background:transparent;border:1px solid var(--bdr2);color:#555;border-radius:7px;padding:5px 12px;font-size:.75rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all var(--trans)}
.btn-logout:hover{border-color:#555;color:#aaa}

/* ── LAYOUT ── */
.main{max-width:1200px;margin:0 auto;padding:24px 20px 60px}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--dk2);border:1px solid var(--bdr);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color var(--trans)}
.stat-card:hover{border-color:rgba(209,10,17,.3)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red)}
.stat-label{font-size:.65rem;color:#555;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}
.stat-num{font-family:'Oswald',sans-serif;font-size:2.2rem;font-weight:700;color:var(--red);line-height:1}
.stat-sub{font-size:.7rem;color:#444;margin-top:3px}
.stat-card.gold-card::before{background:var(--gold)}
.stat-card.gold-card .stat-num{color:var(--gold)}
.stat-card.green-card::before{background:var(--green)}
.stat-card.green-card .stat-num{color:var(--green)}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.sec-title{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:#fff}
.week-nav{display:flex;align-items:center;gap:10px}
.week-btn{background:var(--dk2);border:1px solid var(--bdr);color:#888;border-radius:7px;padding:5px 14px;font-size:.82rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all var(--trans)}
.week-btn:hover{border-color:#555;color:#ccc}
.week-label{font-family:'Oswald',sans-serif;font-size:1rem;color:#ccc;min-width:180px;text-align:center}

/* ── CALENDAR ── */
.calendar{background:var(--dk2);border:1px solid var(--bdr);border-radius:16px;overflow:hidden}
.cal-header{display:grid;grid-template-columns:repeat(5,1fr);background:var(--dk);border-bottom:1px solid var(--bdr)}
.cal-day-head{padding:12px 8px;text-align:center;border-right:1px solid var(--bdr)}
.cal-day-head:last-child{border-right:none}
.cal-day-name{font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;color:#888;letter-spacing:.5px;text-transform:uppercase}
.cal-day-date{font-size:.72rem;color:#444;margin-top:2px}
.cal-day-date.today{color:var(--red);font-weight:700}
.cal-day-head.today-col{background:rgba(209,10,17,.05)}
.cal-body{display:grid;grid-template-columns:repeat(5,1fr)}
.cal-col{border-right:1px solid var(--bdr);min-height:420px;padding:10px 8px;display:flex;flex-direction:column;gap:8px}
.cal-col:last-child{border-right:none}
.cal-col.today-col{background:rgba(209,10,17,.03)}

/* LESSON SLOT */
.lesson-slot{background:var(--dk3);border:1px solid rgba(209,10,17,.2);border-radius:10px;padding:10px 10px 8px;position:relative;cursor:pointer;transition:border-color var(--trans),transform var(--trans)}
.lesson-slot:hover{border-color:rgba(209,10,17,.5);transform:translateY(-1px)}
.lesson-slot.empty-slot{background:rgba(255,255,255,.02);border:1px dashed var(--bdr);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;min-height:68px;color:#333;font-size:.75rem;font-weight:600;letter-spacing:.3px;transition:all var(--trans)}
.lesson-slot.empty-slot:hover{border-color:rgba(209,10,17,.3);color:#666;background:rgba(209,10,17,.04)}
.lesson-time{font-size:.65rem;color:var(--red);font-weight:700;margin-bottom:3px;letter-spacing:.3px}
.lesson-name{font-size:.82rem;font-weight:700;color:#ddd;font-family:'Oswald',sans-serif;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson-addr{font-size:.67rem;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.lesson-note{font-size:.65rem;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;font-style:italic}
.lesson-del{position:absolute;top:6px;right:6px;background:none;border:none;color:#333;cursor:pointer;font-size:.75rem;padding:2px 5px;border-radius:4px;transition:color var(--trans),background var(--trans);line-height:1}
.lesson-del:hover{color:#ff4444;background:rgba(255,0,0,.1)}
.slot-count{font-size:.62rem;color:#333;text-align:center;margin-top:4px;letter-spacing:.3px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:#141414;border:1px solid rgba(209,10,17,.3);border-radius:18px;padding:28px 24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;position:relative}
.modal h2{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:4px}
.modal .modal-sub{font-size:.75rem;color:#555;margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#555;cursor:pointer;font-size:1.3rem;line-height:1;transition:color var(--trans);padding:4px 6px;border-radius:6px}
.modal-close:hover{color:#fff;background:rgba(255,255,255,.06)}
.form-group{margin-bottom:13px}
.form-group label{display:block;font-size:.72rem;color:#555;margin-bottom:4px;letter-spacing:.3px}
.form-group label .req{color:var(--red)}
.form-control{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;color:var(--txt);border-radius:8px;padding:9px 12px;font-size:.87rem;font-family:'Inter',sans-serif;transition:border-color var(--trans),box-shadow var(--trans);outline:none}
.form-control:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(209,10,17,.12)}
.form-control::placeholder{color:#2e2e2e}
select.form-control option{background:#1c1c1c}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;padding:.72rem;letter-spacing:.4px;cursor:pointer;transition:background var(--trans)}
.btn-primary:hover{background:var(--red2)}
.btn-secondary{background:transparent;border:1px solid var(--bdr2);color:#666;border-radius:8px;padding:.55rem 1rem;font-size:.85rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all var(--trans);width:100%;margin-top:8px;text-align:center}
.btn-secondary:hover{border-color:#555;color:#aaa}

/* ── LESSON DETAIL MODAL ── */
.detail-field{display:flex;flex-direction:column;gap:2px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.detail-field:last-child{border-bottom:none}
.detail-label{font-size:.65rem;color:#444;text-transform:uppercase;letter-spacing:1px}
.detail-value{font-size:.9rem;color:#ddd}
.detail-value.empty{color:#333;font-style:italic}

/* ── EMPTY STATE ── */
.empty-week{text-align:center;padding:40px 20px;color:#333}
.empty-week-icon{font-size:3rem;margin-bottom:10px;opacity:.3}
.empty-week p{font-size:.85rem;line-height:1.6}

/* ── MOBILE ── */
.mobile-cal{display:none}
.desktop-cal{display:block}
@media(max-width:767px){
  .mobile-cal{display:block}
  .desktop-cal{display:none}
  .stats-row{grid-template-columns:1fr 1fr}
  .type-nav{display:none}
}
.mobile-day{background:var(--dk2);border:1px solid var(--bdr);border-radius:14px;margin-bottom:12px;overflow:hidden}
.mobile-day-head{background:var(--dk);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.mobile-day-name{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;color:#fff}
.mobile-day-count{font-size:.7rem;color:#555;background:var(--dk3);border:1px solid var(--bdr);border-radius:12px;padding:2px 8px}
.mobile-day-body{padding:10px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:1000;background:var(--dk2);border:1px solid var(--bdr);border-left:3px solid var(--red);border-radius:10px;padding:12px 16px;font-size:.82rem;color:#ccc;transform:translateY(80px);opacity:0;transition:all .3s ease;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-left-color:var(--green)}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <img class="logo" src="https://i.postimg.cc/sx8zRRKV/cropped-circle-image.png" alt="DriveSQ"/>
    <div class="brand-wrap">
      <div class="brand-name">Drive<span>SQ</span></div>
      <div class="brand-sub">Instructor Portal</div>
    </div>
    <div class="type-nav" id="typeNav">Welcome back, loading…</div>
    <div class="nav-right">
      <div class="instructor-badge">
        <div>
          <div class="name" id="navName">Loading…</div>
          <div class="badge-num" id="navBadge">—</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>
</nav>

<div class="main">

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-label">Today's Lessons</div>
      <div class="stat-num" id="statToday">0</div>
      <div class="stat-sub" id="statTodayHrs">0 hrs scheduled</div>
    </div>
    <div class="stat-card gold-card">
      <div class="stat-label">Tomorrow's Lessons</div>
      <div class="stat-num" id="statTomorrow">0</div>
      <div class="stat-sub" id="statTomHrs">0 hrs scheduled</div>
    </div>
    <div class="stat-card green-card">
      <div class="stat-label">This Week Total</div>
      <div class="stat-num" id="statWeek">0</div>
      <div class="stat-sub" id="statWeekHrs">0 hrs this week</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Students</div>
      <div class="stat-num" id="statStudents">0</div>
      <div class="stat-sub">unique this week</div>
    </div>
  </div>

  <!-- DESKTOP CALENDAR -->
  <div class="desktop-cal">
    <div class="sec-header">
      <div class="sec-title">📅 Weekly Lesson Planner</div>
      <div class="week-nav">
        <button class="week-btn" onclick="changeWeek(-1)">← Prev</button>
        <div class="week-label" id="weekLabel">Loading…</div>
        <button class="week-btn" onclick="changeWeek(1)">Next →</button>
      </div>
    </div>
    <div class="calendar">
      <div class="cal-header" id="calHeader"></div>
      <div class="cal-body" id="calBody"></div>
    </div>
  </div>

  <!-- MOBILE CALENDAR -->
  <div class="mobile-cal">
    <div class="sec-header">
      <div class="sec-title">📅 This Week</div>
      <div class="week-nav">
        <button class="week-btn" onclick="changeWeek(-1)">←</button>
        <div class="week-label" id="weekLabelMob" style="min-width:120px;font-size:.82rem">…</div>
        <button class="week-btn" onclick="changeWeek(1)">→</button>
      </div>
    </div>
    <div id="mobileCal"></div>
  </div>

</div>

<!-- ADD LESSON MODAL -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    <h2>Add Lesson</h2>
    <div class="modal-sub" id="addModalSub">Monday 0 Jan</div>
    <form onsubmit="saveLesson(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Start Time <span class="req">*</span></label>
          <input class="form-control" id="lessonTime" type="time" required value="09:00"/>
        </div>
        <div class="form-group">
          <label>Duration <span class="req">*</span></label>
          <select class="form-control" id="lessonDur" required>
            <option value="1">1 hour</option>
            <option value="1.5">1.5 hours</option>
            <option value="2" selected>2 hours</option>
            <option value="2.5">2.5 hours</option>
            <option value="3">3 hours</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Student Name <span class="req">*</span></label>
        <input class="form-control" id="lessonStudent" placeholder="Full name" required/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input class="form-control" id="lessonPhone" placeholder="07xxx xxx xxx" type="tel"/>
      </div>
      <div class="form-group">
        <label>Pickup Address <span class="req">*</span></label>
        <input class="form-control" id="lessonAddr" placeholder="e.g. 14 Oak Street, Didsbury, M20" required/>
      </div>
      <div class="form-group">
        <label>Lesson Type</label>
        <select class="form-control" id="lessonType">
          <option value="Manual">Manual</option>
          <option value="Automatic">Automatic</option>
          <option value="Mock Test">Mock Test</option>
          <option value="Intensive">Intensive</option>
          <option value="Pass Plus">Pass Plus</option>
          <option value="Refresher">Refresher</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea class="form-control" id="lessonNotes" rows="2" placeholder="e.g. Bay parking practice, nervous learner…" style="resize:vertical"></textarea>
      </div>
      <button class="btn-primary" type="submit" id="saveLessonBtn">Save Lesson</button>
      <button class="btn-secondary" type="button" onclick="closeModal('addModal')">Cancel</button>
    </form>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    <h2 id="detailTitle">Lesson Details</h2>
    <div class="modal-sub" id="detailDate">—</div>
    <div id="detailBody"></div>
    <button class="btn-secondary" style="margin-top:16px" onclick="closeModal('detailModal')">Close</button>
    <button class="btn-secondary" style="margin-top:6px;border-color:rgba(255,0,0,.3);color:#cc4444" onclick="deleteFromDetail()">🗑 Remove This Lesson</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ── CONFIG ── */
const SUPABASE_URL='https://vwvbfqrlumvoabzkjxoa.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_7UDWD7Xunqs0mGTpiJbDqQ_n6nrrm1R';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

/* ── AUTH CHECK ── */
const instructor=JSON.parse(sessionStorage.getItem('dsq_instructor')||'null');
if(!instructor){window.location.href='index.html';}

/* ── NAV ── */
document.getElementById('navName').textContent=instructor?.name||'Instructor';
document.getElementById('navBadge').textContent=instructor?.badge||'—';

/* ── TYPING ── */
(function(){
  const phrases=[
    'Welcome back, '+( instructor?.name?.split(' ')[0]||'Instructor')+'! 🚗',
    'Plan your week with ease ✦',
    'Up to 5 students per day ✦',
    'DriveSQ — Drive to Succeed ✦',
    'Manchester\'s finest instructors ✦'
  ];
  const el=document.getElementById('typeNav');
  if(!el)return;
  let pi=0,ci=0,del=false;
  function tick(){
    const f=phrases[pi];
    if(!del){ci++;el.textContent=f.slice(0,ci);if(ci===f.length){del=true;setTimeout(tick,2200);return;}}
    else{ci--;el.textContent=f.slice(0,ci);if(ci===0){del=false;pi=(pi+1)%phrases.length;}}
    setTimeout(tick,del?38:75);
  }
  tick();
})();

function logout(){sessionStorage.removeItem('dsq_instructor');window.location.href='index.html';}

/* ── DATES ── */
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday', 'Saturday', 'Sunday'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const FULL_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function getMonday(d){
  const dt=new Date(d);
  const day=dt.getDay();
  const diff=dt.getDate()-day+(day===0?-6:1);
  const m=new Date(dt.setDate(diff));
  m.setHours(0,0,0,0);
  return m;
}
function dateKey(d){return d.toISOString().slice(0,10);}
function fmtDate(d){return d.getDate()+' '+MONTHS[d.getMonth()];}
function fmtDateFull(d){return DAYS[d.getDay()-1]+', '+d.getDate()+' '+FULL_MONTHS[d.getMonth()]+' '+d.getFullYear();}

let currentWeekStart=getMonday(new Date());
let weekLessons={};
let activeSlot=null;
let detailLessonId=null;

function getWeekDays(start){
  return DAYS.map((_,i)=>{
    const d=new Date(start);
    d.setDate(start.getDate()+i);
    return d;
  });
}

/* ── LOAD LESSONS ── */
async function loadWeekLessons(){
  const days=getWeekDays(currentWeekStart);
  const from=dateKey(days[0]);
  const to=dateKey(days[6]);
  try{
    const{data,error}=await sb.from('lessons')
      .select('*')
      .eq('instructor_id',instructor.id)
      .gte('lesson_date',from)
      .lte('lesson_date',to)
      .order('start_time',{ascending:true});
    if(error)throw error;
    weekLessons={};
    (data||[]).forEach(l=>{
      if(!weekLessons[l.lesson_date])weekLessons[l.lesson_date]=[];
      weekLessons[l.lesson_date].push(l);
    });
  }catch(e){console.error(e);}
  renderCalendar();
  updateStats();
}

/* ── RENDER ── */
function renderCalendar(){
  const days=getWeekDays(currentWeekStart);
  const today=dateKey(new Date());
  const endDay=days[6];
  const startDay=days[0];

  // Week label
  const wl=fmtDate(startDay)+' – '+fmtDate(endDay)+' '+endDay.getFullYear();
  document.getElementById('weekLabel').textContent=wl;
  document.getElementById('weekLabelMob').textContent=wl;

  // Desktop header
  const hdr=document.getElementById('calHeader');
  hdr.innerHTML=days.map((d,i)=>{
    const dk=dateKey(d);
    const isToday=dk===today;
    return`<div class="cal-day-head${isToday?' today-col':''}">
      <div class="cal-day-name">${DAYS[i].slice(0,3)}</div>
      <div class="cal-day-date${isToday?' today':''}">${fmtDate(d)}${isToday?' · Today':''}</div>
    </div>`;
  }).join('');

  // Desktop body
  const body=document.getElementById('calBody');
  body.innerHTML=days.map((d,i)=>{
    const dk=dateKey(d);
    const isToday=dk===today;
    const lessons=weekLessons[dk]||[];
    const slotsUsed=lessons.length;
    const slotsLeft=7-slotsUsed;
    let html=lessons.map(l=>lessonSlotHTML(l,dk)).join('');
    if(slotsLeft>0){
      html+=`<div class="lesson-slot empty-slot" onclick="openAddModal('${dk}','${DAYS[i]}',${i})">
        <span style="font-size:1rem;color:rgba(209,10,17,.4)">+</span> Add Student
      </div>`;
    }
    html+=`<div class="slot-count">${slotsUsed}/5 slots used</div>`;
    return`<div class="cal-col${isToday?' today-col':''}">${html}</div>`;
  }).join('');

  // Mobile
  const mob=document.getElementById('mobileCal');
  mob.innerHTML=days.map((d,i)=>{
    const dk=dateKey(d);
    const isToday=dk===today;
    const lessons=weekLessons[dk]||[];
    const slotsLeft=5-lessons.length;
    let inner=lessons.map(l=>lessonSlotHTML(l,dk)).join('');
    if(slotsLeft>0){
      inner+=`<div class="lesson-slot empty-slot" style="min-height:52px" onclick="openAddModal('${dk}','${DAYS[i]}',${i})">
        <span style="font-size:.9rem;color:rgba(209,10,17,.4)">+</span> Add Student
      </div>`;
    }
    
    
  
    inner+=`<div class="slot-count">${lessons.length}/5 slots</div>`;
    return`<div class="mobile-day${isToday?' ':'' }">
      <div class="mobile-day-head${isToday?' ':'' }" style="${isToday?'border-left:3px solid var(--red)':''}">
        <div class="mobile-day-name" style="${isToday?'color:var(--red)':''}">${DAYS[i]}${isToday?' · Today':''}</div>
        <div class="mobile-day-count">${fmtDate(d)} · ${lessons.length} lesson${lessons.length!==1?'s':''}</div>
      </div>
      <div class="mobile-day-body">${inner}</div>
    </div>`;
  }).join('');
}

function lessonSlotHTML(l,dk){
  const dur=parseFloat(l.duration_hours)||1;
  const endTime=calcEndTime(l.start_time,dur);
  return`<div class="lesson-slot" onclick="openDetail('${l.id}')">
    <div class="lesson-time">${l.start_time}–${endTime} · ${dur}hr${dur!==1?'s':''}</div>
    <div class="lesson-name">${escHtml(l.student_name)}</div>
    <div class="lesson-addr">${escHtml(l.pickup_address||'')}</div>
    ${l.notes?`<div class="lesson-note">${escHtml(l.notes)}</div>`:''}
    <button class="lesson-del" onclick="event.stopPropagation();deleteLesson('${l.id}','${dk}')" title="Remove lesson">✕</button>
  </div>`;
}

function calcEndTime(start,hrs){
  if(!start)return'';
  const [h,m]=start.split(':').map(Number);
  const total=h*60+m+hrs*60;
  const nh=Math.floor(total/60)%24;
  const nm=Math.round(total%60);
  return String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
}

function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── STATS ── */
function updateStats(){
  const today=dateKey(new Date());
  const tom=new Date();tom.setDate(tom.getDate()+1);
  const tomKey=dateKey(tom);
  const todayL=weekLessons[today]||[];
  const tomL=weekLessons[tomKey]||[];
  const allWeek=Object.values(weekLessons).flat();
  const unique=new Set(allWeek.map(l=>l.student_name)).size;
  const sumHrs=arr=>arr.reduce((a,l)=>a+(parseFloat(l.duration_hours)||1),0);

  document.getElementById('statToday').textContent=todayL.length;
  document.getElementById('statTodayHrs').textContent=sumHrs(todayL).toFixed(1)+' hrs today';
  document.getElementById('statTomorrow').textContent=tomL.length;
  document.getElementById('statTomHrs').textContent=sumHrs(tomL).toFixed(1)+' hrs tomorrow';
  document.getElementById('statWeek').textContent=allWeek.length;
  document.getElementById('statWeekHrs').textContent=sumHrs(allWeek).toFixed(1)+' hrs this week';
  document.getElementById('statStudents').textContent=unique;
}

/* ── WEEK NAV ── */
function changeWeek(dir){
  currentWeekStart=new Date(currentWeekStart);
  currentWeekStart.setDate(currentWeekStart.getDate()+dir*7);
  loadWeekLessons();
}

/* ── MODALS ── */
function openAddModal(dateKey,dayName,dayIndex){
  const days=getWeekDays(currentWeekStart);
  const d=days[dayIndex];
  const lessons=weekLessons[dateKey]||[];
  if(lessons.length>=5){showToast('Maximum 5 students per day reached.');return;}
  activeSlot={dateKey,dayName,dayIndex};
  document.getElementById('addModalSub').textContent=dayName+', '+fmtDate(d)+' '+d.getFullYear();
  document.getElementById('addModal').classList.add('open');
  document.getElementById('lessonStudent').focus();
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
  if(id==='addModal'){
    document.getElementById('lessonStudent').value='';
    document.getElementById('lessonPhone').value='';
    document.getElementById('lessonAddr').value='';
    document.getElementById('lessonNotes').value='';
  }
}

async function saveLesson(e){
  e.preventDefault();
  const btn=document.getElementById('saveLessonBtn');
  btn.textContent='Saving…';btn.disabled=true;
  try{
    const{error}=await sb.from('lessons').insert([{
      instructor_id:instructor.id,
      lesson_date:activeSlot.dateKey,
      start_time:document.getElementById('lessonTime').value,
      duration_hours:parseFloat(document.getElementById('lessonDur').value),
      student_name:document.getElementById('lessonStudent').value.trim(),
      student_phone:document.getElementById('lessonPhone').value.trim(),
      pickup_address:document.getElementById('lessonAddr').value.trim(),
      lesson_type:document.getElementById('lessonType').value,
      notes:document.getElementById('lessonNotes').value.trim(),
      created_at:new Date().toISOString()
    }]);
    if(error)throw error;
    closeModal('addModal');
    await loadWeekLessons();
    showToast('Lesson saved! ✓','success');
  }catch(err){showToast('Error saving lesson. Please try again.');}
  finally{btn.textContent='Save Lesson';btn.disabled=false;}
}

async function deleteLesson(id,dk){
  if(!confirm('Remove this lesson?'))return;
  const{error}=await sb.from('lessons').delete().eq('id',id);
  if(!error){await loadWeekLessons();showToast('Lesson removed.');}
  else showToast('Error removing lesson.');
}

/* ── DETAIL ── */
async function openDetail(id){
  const{data,error}=await sb.from('lessons').select('*').eq('id',id).single();
  if(error||!data)return;
  detailLessonId=id;
  const days=getWeekDays(currentWeekStart);
  const d=new Date(data.lesson_date+'T00:00:00');
  const endTime=calcEndTime(data.start_time,parseFloat(data.duration_hours));
  document.getElementById('detailTitle').textContent=data.student_name;
  document.getElementById('detailDate').textContent=fmtDateFull(d)+' · '+data.start_time+'–'+endTime;
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-field"><div class="detail-label">Time</div><div class="detail-value">${data.start_time} – ${endTime} (${data.duration_hours}hr${data.duration_hours!==1?'s':''})</div></div>
    <div class="detail-field"><div class="detail-label">Lesson Type</div><div class="detail-value">${escHtml(data.lesson_type||'Standard')}</div></div>
    <div class="detail-field"><div class="detail-label">Student Name</div><div class="detail-value">${escHtml(data.student_name)}</div></div>
    <div class="detail-field"><div class="detail-label">Phone</div><div class="detail-value ${!data.student_phone?'empty':''}">${data.student_phone?`<a href="tel:${escHtml(data.student_phone)}" style="color:var(--red)">${escHtml(data.student_phone)}</a>`:'Not provided'}</div></div>
    <div class="detail-field"><div class="detail-label">Pickup Address</div><div class="detail-value ${!data.pickup_address?'empty':''}">${escHtml(data.pickup_address)||'Not provided'}</div></div>
    <div class="detail-field"><div class="detail-label">Notes</div><div class="detail-value ${!data.notes?'empty':''}" style="font-style:${data.notes?'normal':'italic'}">${escHtml(data.notes)||'None'}</div></div>
  `;
  document.getElementById('detailModal').classList.add('open');
}

async function deleteFromDetail(){
  if(!detailLessonId)return;
  if(!confirm('Remove this lesson?'))return;
  const{error}=await sb.from('lessons').delete().eq('id',detailLessonId);
  if(!error){closeModal('detailModal');await loadWeekLessons();showToast('Lesson removed.');}
  else showToast('Error removing lesson.');
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(type?' '+type:'');
  clearTimeout(toastTimer);
  setTimeout(()=>t.classList.add('show'),10);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── INIT ── */
loadWeekLessons();
</script>
</body>
</html>
